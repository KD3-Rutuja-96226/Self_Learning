<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background-color: white;
            width: 220px;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
        }

        .card h4 {
            margin: 10px 0 5px;
        }

        .card p {
            font-size: 12px;
            color: gray;
        }

        .price {
            color: orange;
            font-weight: bold;
            margin: 10px 0;
        }

        .btn {
            background-color: green;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn:hover {
            background-color: darkgreen; /* hover effect */
        }
    </style>
</head>

<body>

    <div class="container">
        <h3>Our Products</h3>

        <div class="products">

            <div class="card">
                <img src="laptop.jpg" alt="Product 1">
                <h4>DELL </h4>
                <p>High-quality product that meets your needs.</p>
                <div class="price">$805.08</div>
                <button class="btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="bag.jpeg" alt="Product 2">
                <h4>Laptop Bag</h4>
                <p>Excellent craftsmanship and durable design.</p>
                <div class="price">$11.50</div>
                <button class="btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="keyboard.jpeg" alt="Product 3">
                <h4>Dell Keyboard</h4>
                <p>Reliable and affordable choice for everyday use.</p>
                <div class="price">$12.00</div>
                <button class="btn">Add to Cart</button>
            </div>

        </div>
    </div>

</body>
</html>
